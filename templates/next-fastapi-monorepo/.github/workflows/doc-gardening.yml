name: Doc Gardening

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  doc-gardening:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node ./scripts/knowledge-base.mjs write
      - run: node ./scripts/knowledge-base.mjs check
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: docs/doc-gardening
          commit-message: "chore: garden knowledge base"
          title: "chore: garden knowledge base"
          body: |
            Automated knowledge-base maintenance.

            This workflow refreshed generated docs and index files, then ran the dedicated knowledge-base linter.
          labels: documentation
