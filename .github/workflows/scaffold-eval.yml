name: Scaffold Evaluation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scaffold:
    name: scaffold / ${{ matrix.template.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template:
          - name: next-monorepo
            needs_python: false
            needs_rust: false
          - name: next-fastapi-monorepo
            needs_python: true
            needs_rust: false
          - name: next-axum-monorepo
            needs_python: false
            needs_rust: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: extractions/setup-just@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - if: matrix.template.needs_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.template.needs_python
        uses: astral-sh/setup-uv@v6
      - if: matrix.template.needs_rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - run: >
          node ./scripts/scaffold-eval.mjs
          --template "${{ matrix.template.name }}"
          --target-root "${{ runner.temp }}/scaffold-eval"
          ${{ matrix.template.needs_python && '--needs-python' || '' }}
          ${{ matrix.template.needs_rust && '--needs-rust' || '' }}
